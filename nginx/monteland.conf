# ── MonteLand — Nginx reverse proxy ───────────────────────────────────────────
# Place at: /etc/nginx/sites-available/monteland
# Enable:   ln -s /etc/nginx/sites-available/monteland /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d yourdomain.com (after DNS is pointed to server)
#
# Without domain — use IP directly (HTTP only):
#   server_name 62.171.158.125;

server {
    listen 80;
    server_name 62.171.158.125;   # replace with domain when ready

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer-when-downgrade;

    # Max upload size (for future photo uploads)
    client_max_body_size 20M;

    # ── Backend: API + Admin + Logs ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Admin session cookie needs this
        proxy_set_header   Cookie            $http_cookie;
        proxy_read_timeout 60s;
    }

    location /logs {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /health {
        proxy_pass         http://127.0.0.1:8000;
        access_log         off;
    }

    # ── Frontend: Next.js ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── HTTPS block (uncomment after: certbot --nginx -d yourdomain.com) ──────────
