# ── MonteLand — Production Docker Compose ─────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - .env file with production values (see .env.example)
#   - Docker 24+ with compose plugin

version: "3.9"

services:

  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: monteland-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monteland}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monteland}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — only accessible inside Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monteland}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: monteland-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monteland-backend
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-monteland}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-monteland}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"    # only localhost — Nginx proxies externally
    volumes:
      - uploads_data:/app/uploads
      - log_data:/var/log/monteland
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monteland-celery
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-monteland}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-monteland}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - log_data:/var/log/monteland
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q default,notifications -c 2

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: monteland-frontend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"    # only localhost — Nginx proxies externally
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  log_data:          # mounted into backend container at /var/log/monteland
